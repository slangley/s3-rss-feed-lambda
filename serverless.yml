service: podcast-rss-feed
frameworkVersion: '4'

provider:
  name: aws
  runtime: python3.12
  region: us-east-1  # Must be us-east-1 — ACM certs for CloudFront only work here
  environment:
    BUCKET_NAME: !Ref PodcastBucket
    FEED_TITLE: ${env:FEED_TITLE}
    FEED_DESCRIPTION: ${env:FEED_DESCRIPTION}
    FEED_AUTHOR: ${env:FEED_AUTHOR}
    FEED_EMAIL: ${env:FEED_EMAIL}
    FEED_LANGUAGE: ${env:FEED_LANGUAGE}
    FEED_DOMAIN: ${env:FEED_DOMAIN}
    FEED_IMAGE_URL: ${env:FEED_IMAGE_URL, ''}
    CLOUDFRONT_DISTRIBUTION_ID: !Ref PodcastCloudFront
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:ListBucket
          Resource:
            - !GetAtt PodcastBucket.Arn
            - !Sub '${PodcastBucket.Arn}/*'
        - Effect: Allow
          Action:
            - cloudfront:CreateInvalidation
          Resource:
            - !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${PodcastCloudFront}'

functions:
  generateRss:
    handler: handler.generate_rss
    timeout: 30
    memorySize: 256
    events:
      - s3:
          bucket: !Ref PodcastBucket
          event: s3:ObjectCreated:*
          rules:
            - prefix: episodes/
            - suffix: .mp3
          existing: true  # Bucket is defined in Resources below, not created by this event

resources:
  Resources:

    # ── S3 Bucket ─────────────────────────────────────────────────────────────
    PodcastBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${sls:stage}-audio
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        CorsConfiguration:
          CorsRules:
            - AllowedMethods: [GET, HEAD]
              AllowedOrigins: ['*']
              AllowedHeaders: ['*']
              MaxAge: 3000

    # Allow CloudFront OAC to read from the bucket
    PodcastBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref PodcastBucket
        PolicyDocument:
          Statement:
            - Sid: AllowCloudFrontOAC
              Effect: Allow
              Principal:
                Service: cloudfront.amazonaws.com
              Action: s3:GetObject
              Resource: !Sub '${PodcastBucket.Arn}/*'
              Condition:
                StringEquals:
                  AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${PodcastCloudFront}'

    # ── ACM Certificate ────────────────────────────────────────────────────────
    # DomainValidationOptions + HostedZoneId enables CloudFormation to automatically
    # create the DNS validation CNAME — deploy won't stall waiting for manual action
    PodcastCertificate:
      Type: AWS::CertificateManager::Certificate
      Properties:
        DomainName: ${env:FEED_DOMAIN}
        ValidationMethod: DNS
        DomainValidationOptions:
          - DomainName: ${env:FEED_DOMAIN}
            HostedZoneId: ${env:ROUTE53_HOSTED_ZONE_ID}

    # ── CloudFront Origin Access Control ──────────────────────────────────────
    PodcastOAC:
      Type: AWS::CloudFront::OriginAccessControl
      Properties:
        OriginAccessControlConfig:
          Name: ${self:service}-${sls:stage}-oac
          OriginAccessControlOriginType: s3
          SigningBehavior: always
          SigningProtocol: sigv4

    # ── CloudFront Distribution ────────────────────────────────────────────────
    PodcastCloudFront:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Enabled: true
          Comment: '${self:service} podcast feed'
          Aliases:
            - ${env:FEED_DOMAIN}
          ViewerCertificate:
            AcmCertificateArn: !Ref PodcastCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          DefaultRootObject: rss.xml
          Origins:
            - Id: S3Origin
              # RegionalDomainName is required for OAC — do NOT use WebsiteURL
              DomainName: !GetAtt PodcastBucket.RegionalDomainName
              OriginAccessControlId: !GetAtt PodcastOAC.Id
              S3OriginConfig:
                OriginAccessIdentity: ''  # Empty string required when using OAC
          DefaultCacheBehavior:
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            # AWS Managed CachingOptimized policy
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          HttpVersion: http2and3
          IPV6Enabled: true
          PriceClass: PriceClass_100  # US/Europe only — cheapest for personal use

    # ── Route53 DNS Records ────────────────────────────────────────────────────
    # Z2FDTNDATAQYW2 is the fixed hosted zone ID for ALL CloudFront distributions
    PodcastDnsRecordIPv4:
      Type: AWS::Route53::RecordSet
      Properties:
        HostedZoneId: ${env:ROUTE53_HOSTED_ZONE_ID}
        Name: ${env:FEED_DOMAIN}
        Type: A
        AliasTarget:
          DNSName: !GetAtt PodcastCloudFront.DomainName
          HostedZoneId: Z2FDTNDATAQYW2
          EvaluateTargetHealth: false

    PodcastDnsRecordIPv6:
      Type: AWS::Route53::RecordSet
      Properties:
        HostedZoneId: ${env:ROUTE53_HOSTED_ZONE_ID}
        Name: ${env:FEED_DOMAIN}
        Type: AAAA
        AliasTarget:
          DNSName: !GetAtt PodcastCloudFront.DomainName
          HostedZoneId: Z2FDTNDATAQYW2
          EvaluateTargetHealth: false

  Outputs:
    FeedUrl:
      Value: !Sub 'https://${env:FEED_DOMAIN}/rss.xml'
    CloudFrontDomain:
      Value: !GetAtt PodcastCloudFront.DomainName
    BucketName:
      Value: !Ref PodcastBucket
